services:
  - type: web
    name: predictchurn-ai-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CREATE_DEFAULT_ADMIN
        value: "false"
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_USERS
        value: "ifhamtheadmin:1234567890,smrityraniadmin:1234567890"
      - key: AUTH_HASH_ITERATIONS
        value: "200000"
      - key: ALLOWED_ORIGINS
        value: https://predictchurn-ai-frontend.onrender.com

  - type: web
    name: predictchurn-ai-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://predictchurn-ai-backend.onrender.com
      - key: NEXT_PUBLIC_API_TIMEOUT_MS
        value: "15000"
